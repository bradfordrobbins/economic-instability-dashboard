<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Instability Dashboard</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico">

  <!-- Chart.js + Annotation plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>

  <script src="dashboard.js" defer></script>
</head>

<body>
  <h1>AI Instability Dashboard</h1>

  <div class="chart-grid">

    <div class="chart-card"><canvas id="chart-Trust"></canvas></div>
    <div class="chart-card"><canvas id="chart-Polarization-Index"></canvas></div>
    <div class="chart-card"><canvas id="chart-AI-Exposed-Unemployment"></canvas></div>
    <div class="chart-card"><canvas id="chart-Labor-Force-Participation"></canvas></div>
    <div class="chart-card"><canvas id="chart-Wage-Inequality"></canvas></div>
    <div class="chart-card"><canvas id="chart-AI-Labor-Churn-Index"></canvas></div>
    <div class="chart-card"><canvas id="chart-Consumer-Sentiment"></canvas></div>
    <div class="chart-card"><canvas id="chart-Protest-Events"></canvas></div>
    <div class="chart-card"><canvas id="chart-Governance-Stability"></canvas></div>
    <div class="chart-card"><canvas id="chart-Narrative-Temperature"></canvas></div>

  </div>
</body>
</html>
